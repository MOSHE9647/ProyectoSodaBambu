<!doctype html>
<html lang="es">

<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="title" content="Soda El Bambú - Sin Conexión">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Ups! No hay conexión a internet.</title>

	<style>
		.error_body {
			display: flex;
			flex-direction: column;
			justify-content: center;
			align-items: center;
			margin: 0;
			padding: 0;
			box-sizing: border-box;
			height: 100vh;
			width: 100%;
			background: #f6f6f6;
			font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
		}

		.error_container {
			display: flex;
			flex-direction: column;
			justify-content: center;
			align-items: center;
			background-color: #f8f9fa;
			border: 1px solid #ddd;
			border-radius: 1rem;
			padding: 51px 41px;
			text-align: center;
			max-width: 420px;
			box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
		}

		.brand-logo {
			width: 80px;
			height: 80px;
			background-color: #28A745;
			border: 2px solid #28A745;
			border-radius: 50%;
			display: flex;
			align-items: center;
			justify-content: center;
			margin-bottom: 1rem;
		}

		.brand-logo svg {
			width: 40px;
			height: 40px;
			color: #FAFAFA;
		}

		.brand-title {
			font-size: 1.5rem;
			font-weight: bold;
			color: #333;
			margin-bottom: 0rem;
		}

		.brand-subtitle {
			font-size: 1rem;
			color: #666;
			margin-bottom: 2rem;
		}

		.alert {
			padding: 1rem;
			border-radius: 0.5rem;
			margin-bottom: 2rem;
			text-align: center;
			width: 80%;
		}

		.alert-info {
			background-color: #d1ecf1;
			border-color: #bee5eb;
			color: #0c5460;
		}

		.error_btn {
			background-color: #28A745 !important;
			border: none;
			outline: none;
			padding: 0.75rem 1.5rem;
			border-radius: 0.5rem;
			color: white;
			text-decoration: none;
			display: inline-block;
			transition: background-color 0.3s;
		}

		.error_btn:hover {
			background-color: #1E7E34 !important;
		}

		.error_btn:focus {
			box-shadow: none !important;
		}

		@media (max-width: 540px) {
			.error_container {
				padding: 1rem;
			}
		}
	</style>
</head>

<body class="error_body">
	<div>
		<div class="error_container">
			<!-- Brand Logo -->
			<div class="brand-logo">
				<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
					class="bi bi-wifi-off" viewBox="0 0 16 16">
					<path
						d="M10.706 3.294A12.6 12.6 0 0 0 8 3C5.259 3 2.723 3.882.663 5.379a.485.485 0 0 0-.048.736.52.52 0 0 0 .668.05A11.45 11.45 0 0 1 8 4q.946 0 1.852.148zM8 6c-1.905 0-3.68.56-5.166 1.526a.48.48 0 0 0-.063.745.525.525 0 0 0 .652.065 8.45 8.45 0 0 1 3.51-1.27zm2.596 1.404.785-.785q.947.362 1.785.907a.482.482 0 0 1 .063.745.525.525 0 0 1-.652.065 8.5 8.5 0 0 0-1.98-.932zM8 10l.933-.933a6.5 6.5 0 0 1 2.013.637c.285.145.326.524.1.75l-.015.015a.53.53 0 0 1-.611.09A5.5 5.5 0 0 0 8 10m4.905-4.905.747-.747q.886.451 1.685 1.03a.485.485 0 0 1 .047.737.52.52 0 0 1-.668.05 11.5 11.5 0 0 0-1.811-1.07M9.02 11.78c.238.14.236.464.04.66l-.707.706a.5.5 0 0 1-.707 0l-.707-.707c-.195-.195-.197-.518.04-.66A2 2 0 0 1 8 11.5c.374 0 .723.102 1.021.28zm4.355-9.905a.53.53 0 0 1 .75.75l-10.75 10.75a.53.53 0 0 1-.75-.75z" />
				</svg>
			</div>

			<!-- Brand Title and Subtitle -->
			<h1 class="brand-title">Sin Conexión a Internet</h1>
			<p class="brand-subtitle">Sistema de Gestión Interna</p>

			<!-- Info Alert -->
			<div class="alert alert-info">
				<span>¡Ups! No tienes conexión a internet. <br>Por favor, revisa tu conexión de red e intenta de
					nuevo.</span>
			</div>

			<!-- Back to Home Button -->
			<a href="/" class="error_btn">Volver a la Página Principal</a>
		</div>
	</div>
</body>

</html>
